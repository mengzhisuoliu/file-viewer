viewer:
  name: Flyfish Viewer
  mode: component
  packages:
    vue3: "@flyfish-group/file-viewer3@1.0.20"
    vue2: "@flyfish-group/file-viewer@1.0.20"
  lazy: true
  defaultInput: url
  toolbar:
    density: compact
    allowUpload: true
    allowUrlPreview: true
  groups:
    documents:
      label: Documents
      formats: [doc, docx, pdf, ofd, typ, typst]
      defaultScale: fit-width
    drawings:
      label: Drawings
      formats: [dxf, dwg, dwf, dwfx, xps, excalidraw, drawio, dio]
      fallback: cad-worker-wasm-or-clear-unsupported-message
    models:
      label: 3D Models
      formats: [glb, gltf, obj, stl, ply, fbx, dae, 3ds, 3mf, amf, usd, usdz, kmz, pcd, wrl, vrml, xyz, vtk, vtp, step, stp, iges, igs, ifc, 3dm]
      renderer: three.js
    ebooks:
      label: Ebooks
      formats: [epub, umd]
      renderer: epubjs-or-umd-parser
    source:
      label: Code and Data
      renderer: highlight.js
      escapeHtml: true
      formats:
        - json
        - js
        - ts
        - tsx
        - vue
        - yaml
        - sql
  smoke:
    browser: chrome
    assertions:
      - sample-picker-closes-after-select
      - pdf-nav-can-toggle
      - model-viewer-renders-or-explains
      - code-viewer-renders-highlight
