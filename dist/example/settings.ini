[viewer]
theme = light
async = true
default_scale = fit-width
sample_picker = accordion
close_after_select = true

[formats]
ofd = enabled
typst = enabled
dxf = enabled
dwg = compatibility-message
html = source-only

[pdf]
toolbar = enabled
navigation = enabled
auto_fit_on_resize = true

[security]
execute_html = false
allow_remote_url = true
require_cors = true
