<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flyfish Viewer Script Tag Demo</title>
    <style>
      :root {
        color: #172033;
        background: #f4f7f8;
        font-family: Inter, "Segoe UI", "PingFang SC", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border-bottom: 1px solid #d8e1e8;
        background: #ffffff;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 18px;
        line-height: 1.3;
      }

      p {
        margin-top: 4px;
        color: #64748b;
        font-size: 13px;
      }

      code {
        padding: 2px 6px;
        border-radius: 5px;
        background: #edf2f7;
        color: #334155;
      }

      #viewer {
        min-height: 0;
        background: #ffffff;
      }

    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Script Tag / IIFE</h1>
          <p>普通 <code>&lt;script&gt;</code> 页面使用 <code>window.FlyfishFileViewerWeb.mountViewer</code> 挂载。</p>
        </div>
        <p id="status">loading</p>
      </header>
      <div id="viewer" data-testid="iife-viewer-host"></div>
    </main>

    <script src="/vendor/file-viewer-web/flyfish-file-viewer-web.iife.js"></script>
    <script>
      (function () {
        var statusNode = document.getElementById('status')
        var host = document.getElementById('viewer')
        var api = window.FlyfishFileViewerWeb

        function setStatus(value) {
          document.body.setAttribute('data-viewer-status', value)
          statusNode.textContent = value
        }

        if (!api || typeof api.mountViewer !== 'function') {
          setStatus('missing-global')
          throw new Error('window.FlyfishFileViewerWeb.mountViewer is unavailable')
        }

        api.mountViewer(host, {
          url: '/example/preview.md',
          options: {
            theme: 'light',
            toolbar: {
              position: 'bottom-right'
            }
          },
          onEvent: function (event) {
            if (event && (event.type === 'load-start' || event.type === 'load-complete')) {
              setStatus(event.type)
            }
          }
        })
        setStatus('mounted')
      })()
    </script>
  </body>
</html>
